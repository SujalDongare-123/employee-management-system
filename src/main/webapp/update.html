<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Employee</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

	<!-- Navbar -->
	<nav class="navbar navbar-dark px-4">
		<span class="navbar-brand">Employee System</span>
	</nav>

	<!-- Main Container -->
	<div class="container mt-5">

		<div class="card p-4">

			<h3 class="text-center title mb-4">Update Employee</h3>

			<form action="update" method="post">

				<div class="mb-3">
					<label class="form-label"> Employee ID </label> <input type="text"
						name="id" id="id" class="form-control" readonly>
				</div>

				<div class="mb-3">
					<label class="form-label"> Employee Name </label> <input
						type="text" name="name" id="name" class="form-control" required>
				</div>

				<div class="mb-3">
					<label class="form-label"> Email Address </label> <input
						type="email" name="email" id="email" class="form-control" required>
				</div>

				<div class="mb-4">
					<label class="form-label"> Salary </label> <input type="number"
						name="salary" id="salary" class="form-control" required>
				</div>

				<!-- Buttons -->
				<button type="submit" class="btn btn-warning w-100 mb-3">
					Update Employee</button>

				<a href="view" class="btn btn-secondary w-100"> Back to Employee
					List </a>

			</form>

		</div>

	</div>

	<!-- Autofill Script -->
	<script>
		const params = new URLSearchParams(window.location.search);

		document.getElementById("id").value = params.get("id");

		document.getElementById("name").value = params.get("name");

		document.getElementById("email").value = params.get("email");

		document.getElementById("salary").value = params.get("salary");
	</script>

</body>
</html>
